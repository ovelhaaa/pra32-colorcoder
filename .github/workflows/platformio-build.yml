name: PlatformIO Build Matrix

on:
  pull_request:
    paths:
      - '.github/workflows/platformio-build.yml'
      - 'platformio.ini'
      - 'Digital-Synth-PRA32-U2/**'
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/platformio-build.yml'
      - 'platformio.ini'
      - 'Digital-Synth-PRA32-U2/**'
  workflow_dispatch:

concurrency:
  group: platformio-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - i2s_default
          - uart_midi
          - pwm_optional

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Compile ${{ matrix.env }}
        run: platformio run -e ${{ matrix.env }}

      - name: Upload i2s_default binaries
        if: matrix.env == 'i2s_default'
        uses: actions/upload-artifact@v4
        with:
          name: i2s_default-binaries
          path: |
            .pio/build/i2s_default/*.uf2
            .pio/build/i2s_default/*.bin
            .pio/build/i2s_default/*.elf
          if-no-files-found: error
