name: Phase Next Reminder

on:
  push:
    branches:
      - main
      - master
    paths:
      - docs/migration-status/status.md

jobs:
  open-next-phase-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect next phase
        id: detect
        run: |
          output="$(./scripts/next_phase_from_status.sh)"
          echo "$output" >> "$GITHUB_OUTPUT"

      - name: Render kickoff issue body
        if: steps.detect.outputs.NEXT_PHASE != ''
        run: |
          mkdir -p .tmp
          ./scripts/render_phase_kickoff_issue.sh "${{ steps.detect.outputs.NEXT_PHASE }}" > .tmp/phase-kickoff-body.md

      - name: Create or update next-phase kickoff issue
        if: steps.detect.outputs.NEXT_PHASE != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const phase = '${{ steps.detect.outputs.NEXT_PHASE }}';
            const title = `Kick off Phase ${phase} Codex task`;
            const body = fs.readFileSync('.tmp/phase-kickoff-body.md', 'utf8');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              core.info(`Updated existing reminder issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
              core.info(`Created reminder issue #${created.data.number}`);
            }
